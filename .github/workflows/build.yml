name: Build Astreal Motion Blur

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate Project Structure
        run: |
          # Create precise directory structure
          mkdir -p src/main/java/com/astreal/motionblur
          mkdir -p src/main/resources
          
          # ── settings.gradle (Required for Fabric Loom) ──
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  maven { url = "https://maven.fabricmc.net/" }
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          EOF

          # ── gradle.properties (Pinned Stable Versions) ──
          cat > gradle.properties << 'EOF'
          minecraft_version=1.21.1
          loader_version=0.16.0
          fabric_version=0.102.0+1.21.1
          mod_version=1.0.0
          maven_group=com.astreal.motionblur
          archives_base_name=astreal-motionblur
          EOF

          # ── build.gradle (Fixed Plugin & Repository) ──
          cat > build.gradle << 'EOF'
          plugins {
              id 'fabric-loom' version '1.7-SNAPSHOT'
          }
          repositories {
              maven { url = "https://maven.fabricmc.net/" }
              mavenCentral()
          }
          dependencies {
              minecraft "com.mojang:minecraft:${project.minecraft_version}"
              mappings loom.officialMojangMappings()
              modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
              modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
          }
          EOF

          # ── fabric.mod.json ──
          cat > src/main/resources/fabric.mod.json << 'EOF'
          {
            "schemaVersion": 1,
            "id": "astreal-motionblur",
            "version": "1.0.0",
            "name": "Astreal Motion Blur",
            "authors": ["Astreal"],
            "contact": {},
            "license": "MIT",
            "environment": "client",
            "entrypoints": { "client": ["com.astreal.motionblur.MotionBlurClient"] },
            "depends": { "fabricloader": ">=0.16.0", "minecraft": "~1.21.1", "java": ">=21" }
          }
          EOF

          # ── MotionBlurClient.java (Fixed Category Object Error) ──
          cat > src/main/java/com/astreal/motionblur/MotionBlurClient.java << 'EOF'
          package com.astreal.motionblur;
          import net.fabricmc.api.ClientModInitializer;
          import net.fabricmc.fabric.api.client.keybinding.v1.KeyBindingHelper;
          import net.minecraft.client.KeyMapping;
          import com.mojang.blaze3d.platform.InputConstants;
          import org.lwjgl.glfw.GLFW;

          public class MotionBlurClient implements ClientModInitializer {
              private static KeyMapping menuKey;
              @Override
              public void onInitializeClient() {
                  // Uses standard category string to avoid 'String cannot be converted to Category'
                  menuKey = KeyBindingHelper.registerKeyMapping(new KeyMapping(
                      "key.motionblur.menu",
                      InputConstants.Type.KEYSYM,
                      GLFW.GLFW_KEY_RIGHT_SHIFT,
                      "key.categories.misc"
                  ));
              }
          }
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Mod
        run: gradle build --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Astreal-Motion-Blur-JAR
          path: build/libs/*.jar
          
