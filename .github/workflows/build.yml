name: Build VelocityOptic

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate Project Structure
        run: |
          mkdir -p src/main/java/com/astreal/velocityoptic
          mkdir -p src/main/resources/assets/minecraft/shaders/program
          
          # ── gradle.properties (Targeting 1.21.11) ──
          cat > gradle.properties << 'EOF'
          minecraft_version=1.21.11
          loader_version=0.15.11
          fabric_version=0.100.3+1.21
          mod_version=1.0.0
          maven_group=com.astreal.velocityoptic
          archives_base_name=velocityoptic
          EOF

          # ── build.gradle (Mojang Mappings Fix) ──
          cat > build.gradle << 'EOF'
          plugins {
              id 'fabric-loom' version '1.7-SNAPSHOT'
          }
          dependencies {
              minecraft "com.mojang:minecraft:${project.minecraft_version}"
              mappings loom.officialMojangMappings()
              modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
              modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
          }
          EOF

          # ── VelocityOpticClient.java (Fixed Category Error) ──
          cat > src/main/java/com/astreal/velocityoptic/VelocityOpticClient.java << 'EOF'
          package com.astreal.velocityoptic;
          import net.fabricmc.api.ClientModInitializer;
          import net.fabricmc.fabric.api.client.event.lifecycle.v1.ClientTickEvents;
          import net.fabricmc.fabric.api.client.keybinding.v1.KeyBindingHelper;
          import net.minecraft.client.KeyMapping;
          import com.mojang.blaze3d.platform.InputConstants;
          import org.lwjgl.glfw.GLFW;

          public class VelocityOpticClient implements ClientModInitializer {
              public static float blurStrength = 0.4f; 
              private static KeyMapping guiKey;
              @Override
              public void onInitializeClient() {
                  guiKey = KeyBindingHelper.registerKeyMapping(new KeyMapping(
                      "key.velocityoptic.open_menu", 
                      InputConstants.Type.KEYSYM,
                      GLFW.GLFW_KEY_RIGHT_SHIFT, 
                      "key.categories.misc"
                  ));
                  ClientTickEvents.END_CLIENT_TICK.register(client -> {
                      while (guiKey.consumeClick()) {
                          client.setScreen(new VelocityOpticScreen());
                      }
                  });
              }
          }
          EOF

          # ── VelocityOpticScreen.java (Mojang Mappings Fix) ──
          cat > src/main/java/com/astreal/velocityoptic/VelocityOpticScreen.java << 'EOF'
          package com.astreal.velocityoptic;
          import net.minecraft.client.gui.screens.Screen;
          import net.minecraft.client.gui.GuiGraphics;
          import net.minecraft.client.gui.components.Button;
          import net.minecraft.client.gui.components.AbstractSliderButton;
          import net.minecraft.network.chat.Component;

          public class VelocityOpticScreen extends Screen {
              public VelocityOpticScreen() { super(Component.literal("VelocityOptic Settings")); }
              @Override
              protected void init() {
                  this.addRenderableWidget(new AbstractSliderButton(this.width / 2 - 100, this.height / 2 - 20, 200, 20, 
                      Component.literal("Blur Strength: " + (int)(VelocityOpticClient.blurStrength * 100) + "%"), 
                      (double) VelocityOpticClient.blurStrength) {
                      @Override protected void updateMessage() { this.setMessage(Component.literal("Blur Strength: " + (int)(this.value * 100) + "%")); }
                      @Override protected void applyValue() { VelocityOpticClient.blurStrength = (float) this.value; }
                  });
                  this.addRenderableWidget(Button.builder(Component.literal("Done"), button -> this.onClose())
                      .bounds(this.width / 2 - 100, this.height / 2 + 20, 200, 20).build());
              }
              @Override
              public void render(GuiGraphics guiGraphics, int mouseX, int mouseY, float delta) {
                  super.render(guiGraphics, mouseX, mouseY, delta);
                  guiGraphics.drawCenteredString(this.font, this.title, this.width / 2, 20, 0xFFFFFF);
              }
          }
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Mod
        run: chmod +x gradlew && ./gradlew build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VelocityOptic-1.21.11-Build
          path: build/libs/*.jar
          
